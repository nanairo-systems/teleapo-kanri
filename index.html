<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📞</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テレアポ顧客管理システム</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-brand">
      <span class="icon">📞</span>テレアポ顧客管理
    </a>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    <ul class="navbar-nav" id="navMenu">
      <li><a href="index.html" class="active">🏠 ホーム</a></li>
      <li id="navDashboardLi"><a href="dashboard.html">📊 ダッシュボード</a></li>
      <li><a href="questions.html">❓ 質問・回答</a></li>
      <li><a href="import.html">📥 インポート</a></li>
      <li id="navSettingsLi"><a href="settings.html">⚙️ 設定</a></li>
      <li class="nav-user" id="navUserInfo"></li>
      <li><button class="btn-logout" onclick="logout()">ログアウト</button></li>
    </ul>
  </div>
</nav>

<div class="toast-container" id="toastContainer"></div>

<div class="container">
  <div class="page-header">
    <div class="page-header-left">
      <h1>業務一覧</h1>
      <p>管理する業務を選択してください</p>
    </div>
  </div>

  <div class="business-grid" id="businessGrid">
    <!-- JSで描画 -->
  </div>
</div>

<!-- 業務追加・編集モーダル -->
<div class="modal-backdrop" id="businessModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">新しい業務を追加</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <form id="businessForm" onsubmit="return handleSave(event)">
        <div class="form-group">
          <label>業務名<span class="required">*</span></label>
          <input type="text" name="name" id="bizName" required placeholder="例：足場の買取・販売">
        </div>
        <div class="form-group">
          <label>説明</label>
          <textarea name="description" id="bizDesc" placeholder="この業務の概要を入力..."></textarea>
        </div>
        <div class="form-group">
          <label>アイコン</label>
          <div class="icon-picker" id="iconPicker"></div>
        </div>
        <div class="form-group">
          <label>テーマカラー</label>
          <div class="color-picker" id="colorPicker"></div>
        </div>
        <input type="hidden" id="editingId">
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="handleSave(event)">保存</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-api.js"></script>
<script>
  const ICONS = ['🏗️','🔧','📦','🏢','🏠','💼','🚛','📞','🛠️','📋','💰','🔩','⚡','🏭','📐'];
  const COLORS = ['#2563eb','#16a34a','#dc2626','#f59e0b','#7c3aed','#0891b2','#db2777','#ea580c','#4f46e5','#059669'];

  const DEFAULT_BUSINESSES = [
    {
      id: 'scaffolding-trade',
      name: '足場の買取・販売',
      description: '足場材の買取・販売に関するテレアポ業務',
      icon: '📦',
      color: '#2563eb',
      createdAt: new Date().toISOString()
    },
    {
      id: 'scaffolding-construction',
      name: '足場工事',
      description: '足場工事の受注に関するテレアポ業務',
      icon: '🏗️',
      color: '#16a34a',
      createdAt: new Date().toISOString()
    }
  ];

  // ── 認証チェック ──
  (function() {
    const a = JSON.parse(localStorage.getItem('authSession') || 'null');
    if (!a || Date.now() > a.expiry) { localStorage.removeItem('authSession'); location.replace('login.html'); }
  })();

  function logout() {
    if (confirm('ログアウトしますか？')) { localStorage.removeItem('authSession'); location.href = 'login.html'; }
  }

  let businesses = [];
  let selectedIcon = '📦';
  let selectedColor = '#2563eb';

  async function saveAppSetting(key, value) {
    await syncSettingToSupabase(key, value);
  }

  document.addEventListener('DOMContentLoaded', async () => {
    const auth = getCurrentUser();
    if (auth) {
      const el = document.getElementById('navUserInfo');
      if (el) el.textContent = `👤 ${auth.name}`;
      if (auth.role !== 'admin') {
        const sLi = document.getElementById('navSettingsLi');
        if (sLi) sLi.style.display = 'none';
      }
    }
    loadBusinesses();
    renderGrid();
    await syncSettingsFromSupabase();
    loadBusinesses();
    renderGrid();
  });

  function getVisibleBusinesses() {
    const allowed = getUserAllowedBusinesses();
    if (allowed === null) return businesses;
    if (allowed.length === 0) return businesses;
    return businesses.filter(b => allowed.includes(b.id));
  }

  function loadBusinesses() {
    const saved = localStorage.getItem('businesses');
    if (saved) {
      businesses = JSON.parse(saved);
    } else {
      businesses = DEFAULT_BUSINESSES;
      saveBusinesses();
    }
  }

  function saveBusinesses() {
    localStorage.setItem('businesses', JSON.stringify(businesses));
    saveAppSetting('businesses', businesses);
  }

  function renderGrid() {
    const grid = document.getElementById('businessGrid');
    const visibleBiz = getVisibleBusinesses();
    const auth = getCurrentUser();
    const isAdmin = auth && auth.role === 'admin';
    const cardsHtml = visibleBiz.map(biz => `
      <div class="business-card-wrapper">
        <a class="business-card" href="customers.html?businessId=${encodeURIComponent(biz.id)}" data-id="${biz.id}">
          ${isAdmin ? `<button class="card-menu-btn" onclick="event.preventDefault();event.stopPropagation();toggleMenu('${biz.id}')">⋮</button>` : ''}
          <div class="business-card-banner" style="background:${biz.color}"></div>
          <div class="business-card-body">
            <div class="business-card-icon" style="background:${biz.color}15">${biz.icon}</div>
            <div class="business-card-name">${esc(biz.name)}</div>
            <div class="business-card-desc">${esc(biz.description || '')}</div>
            <div class="business-card-stats">
              <div class="business-stat">
                <span class="business-stat-value" id="stat-total-${biz.id}">-</span>
                <span class="business-stat-label">顧客数</span>
              </div>
              <div class="business-stat">
                <span class="business-stat-value" id="stat-called-${biz.id}">-</span>
                <span class="business-stat-label">架電済み</span>
              </div>
              <div class="business-stat">
                <span class="business-stat-value" id="stat-notcalled-${biz.id}">-</span>
                <span class="business-stat-label">未架電</span>
              </div>
            </div>
          </div>
        </a>
        ${isAdmin ? `<div class="card-menu" id="menu-${biz.id}">
          <button class="card-menu-item" onclick="editBusiness('${biz.id}')">✏️ 編集</button>
          <button class="card-menu-item danger" onclick="deleteBusiness('${biz.id}')">🗑️ 削除</button>
        </div>` : ''}
      </div>
    `).join('');

    const addCardHtml = isAdmin ? `
      <div class="add-card" onclick="openAddModal()">
        <div class="add-card-icon">＋</div>
        <div class="add-card-text">新しい業務を追加</div>
      </div>` : '';

    grid.innerHTML = cardsHtml + addCardHtml;
    loadAllStats();
  }

  async function loadAllStats() {
    try {
      const data = await apiGetCustomers();
      const customers = data.customers || [];

      getVisibleBusinesses().forEach(biz => {
        const bizCustomers = customers.filter(c => c.businessId === biz.id);
        const totalEl    = document.getElementById(`stat-total-${biz.id}`);
        const calledEl   = document.getElementById(`stat-called-${biz.id}`);
        const notCalledEl = document.getElementById(`stat-notcalled-${biz.id}`);
        if (totalEl)     totalEl.textContent = bizCustomers.length;
        if (calledEl)    calledEl.textContent = bizCustomers.filter(c => (c.callCount || 0) > 0).length;
        if (notCalledEl) notCalledEl.textContent = bizCustomers.filter(c => (c.callCount || 0) === 0).length;
      });
    } catch(e) {
      console.error('統計読み込み失敗:', e);
    }
  }

  // ── メニュー ──
  function toggleMenu(id) {
    document.querySelectorAll('.card-menu').forEach(m => {
      if (m.id !== `menu-${id}`) m.classList.remove('show');
    });
    document.getElementById(`menu-${id}`).classList.toggle('show');
  }
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.card-menu-btn') && !e.target.closest('.card-menu')) {
      document.querySelectorAll('.card-menu').forEach(m => m.classList.remove('show'));
    }
  });

  // ── モーダル ──
  function openAddModal() {
    document.getElementById('modalTitle').textContent = '新しい業務を追加';
    document.getElementById('businessForm').reset();
    document.getElementById('editingId').value = '';
    selectedIcon = '📦';
    selectedColor = '#2563eb';
    renderPickers();
    document.getElementById('businessModal').classList.add('show');
  }

  function editBusiness(id) {
    document.querySelectorAll('.card-menu').forEach(m => m.classList.remove('show'));
    const biz = businesses.find(b => b.id === id);
    if (!biz) return;
    document.getElementById('modalTitle').textContent = '業務を編集';
    document.getElementById('bizName').value = biz.name;
    document.getElementById('bizDesc').value = biz.description || '';
    document.getElementById('editingId').value = biz.id;
    selectedIcon = biz.icon;
    selectedColor = biz.color;
    renderPickers();
    document.getElementById('businessModal').classList.add('show');
  }

  function closeModal() {
    document.getElementById('businessModal').classList.remove('show');
  }

  function renderPickers() {
    document.getElementById('iconPicker').innerHTML = ICONS.map(ic =>
      `<div class="icon-option ${ic === selectedIcon ? 'selected' : ''}" onclick="selectIcon(this, '${ic}')">${ic}</div>`
    ).join('');
    document.getElementById('colorPicker').innerHTML = COLORS.map(c =>
      `<div class="color-option ${c === selectedColor ? 'selected' : ''}" style="background:${c}" onclick="selectColor(this, '${c}')"></div>`
    ).join('');
  }

  function selectIcon(el, icon) {
    selectedIcon = icon;
    document.querySelectorAll('.icon-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
  }

  function selectColor(el, color) {
    selectedColor = color;
    document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
  }

  function handleSave(event) {
    event.preventDefault();
    const name = document.getElementById('bizName').value.trim();
    const description = document.getElementById('bizDesc').value.trim();
    const editingId = document.getElementById('editingId').value;

    if (editingId) {
      const biz = businesses.find(b => b.id === editingId);
      if (biz) {
        biz.name = name;
        biz.description = description;
        biz.icon = selectedIcon;
        biz.color = selectedColor;
      }
      showToast('業務を更新しました', 'success');
    } else {
      const id = name.toLowerCase().replace(/[^a-z0-9\u3000-\u9fff]/g, '-').replace(/-+/g, '-') + '-' + Date.now().toString(36);
      businesses.push({
        id,
        name,
        description,
        icon: selectedIcon,
        color: selectedColor,
        createdAt: new Date().toISOString()
      });
      showToast('業務を追加しました', 'success');
    }

    saveBusinesses();
    renderGrid();
    closeModal();
    return false;
  }

  async function deleteBusiness(id) {
    document.querySelectorAll('.card-menu').forEach(m => m.classList.remove('show'));
    const biz = businesses.find(b => b.id === id);
    if (!biz) return;

    let custCount = 0;
    try {
      const res = await apiGetCustomers(id);
      custCount = res.customers.length;
    } catch(e) {}

    const msg = custCount > 0
      ? `「${biz.name}」を削除しますか？\n\n⚠️ この業務には顧客が ${custCount}件 あります。\n顧客はアーカイブに移動され、後で復元できます。`
      : `「${biz.name}」を削除しますか？`;
    if (!confirm(msg)) return;

    try {
      if (custCount > 0) await apiArchiveByBusiness(id);
      businesses = businesses.filter(b => b.id !== id);
      saveBusinesses();
      renderGrid();
      showToast(`業務を削除しました${custCount > 0 ? `（${custCount}件をアーカイブ）` : ''}`, 'success');
    } catch(e) {
      showToast('削除に失敗しました: ' + e.message, 'error');
    }
  }

  // ── ユーティリティ ──
  function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function showToast(msg, type = 'success') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div'); t.className = `toast ${type}`;
    t.innerHTML = `<span>${type==='success'?'✅':'❌'}</span> ${esc(msg)}`;
    c.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 4000);
  }

  document.getElementById('businessModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });
  document.getElementById('hamburger').addEventListener('click', () => {
    document.getElementById('navMenu').classList.toggle('open');
  });
</script>

</body>
</html>
