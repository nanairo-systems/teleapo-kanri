<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📞</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>顧客詳細 - テレアポ顧客管理</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-brand"><span class="icon">📞</span>テレアポ顧客管理</a>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    <ul class="navbar-nav" id="navMenu">
      <li><a href="index.html">🏠 ホーム</a></li>
      <li><a href="#" id="navCustomers">📋 顧客一覧</a></li>
      <li><a href="dashboard.html">📊 ダッシュボード</a></li>
      <li><a href="questions.html">❓ 質問・回答<span class="nav-q-badge"></span></a></li>
      <li><a href="import.html">📥 インポート</a></li>
      <li id="navSettingsLi"><a href="settings.html">⚙️ 設定</a></li>
      <li class="nav-user" id="navUserInfo"></li>
      <li><button class="btn-logout" onclick="logout()">ログアウト</button></li>
    </ul>
  </div>
</nav>

<div class="loading-overlay" id="loading"><div class="spinner"></div></div>
<div class="toast-container" id="toastContainer"></div>

<div class="container">
  <div class="breadcrumb">
    <a href="index.html">ホーム</a><span>›</span>
    <a href="#" id="bcBiz">業務</a><span>›</span>
    <span id="bcName">顧客詳細</span>
  </div>

  <div class="page-header">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="btn btn-outline btn-sm" onclick="goBackToList()" id="backBtn">← 戻る</button>
      <h1 id="pageTitle">顧客詳細</h1>
    </div>
  </div>

  <div id="crossBizDups" style="display:none;margin-bottom:16px;padding:12px 16px;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;font-size:13px;"></div>

  <!-- 電話発信ボタン -->
  <div class="call-actions" id="callActions" style="display:none;">
    <a class="call-action-btn phone" id="telBtn" href="#">
      <span class="btn-icon">📱</span>
      <span class="btn-label">電話をかける<small>端末の電話アプリで発信</small></span>
    </a>
    <a class="call-action-btn zoom" id="zoomBtn" href="#">
      <span class="btn-icon">💻</span>
      <span class="btn-label">Zoom Phoneで発信<small>Zoomアプリで発信</small></span>
    </a>
  </div>

  <!-- 架電結果登録パネル（折りたたみ） -->
  <div class="call-panel" id="callPanel">
    <div class="call-panel-toggle" id="callPanelToggle" onclick="toggleCallPanel()">
      <h2>📞 架電結果を登録</h2>
      <span class="toggle-arrow">▼</span>
    </div>
    <div class="call-panel-body" id="callPanelBody">
      <div class="call-panel-inner">
        <form id="callForm" onsubmit="return handleCallSubmit(event)">
          <div class="timer-section">
            <div class="timer-display" id="timerDisplay">00:00</div>
            <div class="timer-buttons">
              <button type="button" class="btn btn-success btn-sm" id="timerStart" onclick="startTimer()">▶ 開始</button>
              <button type="button" class="btn btn-outline btn-sm" id="timerStop" onclick="stopTimer()" style="display:none;">⏸ 停止</button>
              <button type="button" class="btn btn-outline btn-sm" onclick="resetTimer()">↻ リセット</button>
            </div>
          </div>

          <div class="section-label">📞 電話ステータス（1つ選択）</div>
          <div class="tag-buttons" id="callStatusButtons" style="margin-bottom:16px;"></div>

          <div class="section-label">🏷️ 顧客ステータスタグ（複数選択可）</div>
          <div class="tag-buttons" id="tagButtons"></div>

          <div class="form-row">
            <div class="form-group">
              <label>架電日時</label>
              <input type="datetime-local" id="callDate">
            </div>
            <div class="form-group">
              <label>対応者</label>
              <div id="operatorDisplay" class="operator-display">—</div>
            </div>
          </div>

          <div class="form-group">
            <label>メモ</label>
            <textarea id="callMemo" placeholder="通話内容や次回アクションなどを記録..."></textarea>
          </div>

          <div class="form-group">
            <label>❓ お客様からの質問</label>
            <textarea id="callQuestion" placeholder="お客様から受けた質問を記録..."></textarea>
          </div>

          <input type="hidden" id="callDuration">

          <div class="form-actions-inline">
            <button type="button" class="btn btn-outline" onclick="toggleCallPanel()">閉じる</button>
            <button type="submit" class="btn btn-primary">💾 架電結果を登録</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="two-col">
    <!-- 左: 顧客情報 -->
    <div>
      <div class="card">
        <div class="card-header">
          <h2>📋 顧客情報</h2>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-outline btn-sm" onclick="openEditModal()">✏️ 編集</button>
            <button class="btn btn-outline btn-sm" onclick="handleArchive()" title="アーカイブ">📦 アーカイブ</button>
            <button class="btn btn-danger btn-sm" onclick="handleDelete()">🗑️ 削除</button>
          </div>
        </div>
        <div class="card-body">
          <div class="customer-tags" id="customerTagsDisplay"></div>
          <div class="info-grid" id="customerInfo" style="margin-top:14px;"></div>
        </div>
      </div>

      <!-- 備考カード -->
      <div class="card">
        <div class="card-header">
          <h2>📝 備考</h2>
          <button class="btn btn-outline btn-sm" onclick="openAddNoteForm()">＋ 追加</button>
        </div>
        <div class="card-body">
          <!-- 備考追加フォーム（初期非表示） -->
          <div id="addNoteForm" class="note-add-form" style="display:none;">
            <textarea id="noteInput" placeholder="備考を入力..." rows="3"></textarea>
            <div class="form-actions-inline" style="margin-top:8px;">
              <button class="btn btn-sm btn-outline" onclick="closeAddNoteForm()">キャンセル</button>
              <button class="btn btn-sm btn-primary" onclick="doAddNote()">追加する</button>
            </div>
          </div>
          <div id="notesContainer"></div>
        </div>
      </div>
    </div>

    <!-- 右: 架電履歴 -->
    <div>
      <div class="card">
        <div class="card-header">
          <h2>📞 架電履歴</h2>
          <span style="font-size:13px;color:var(--text-muted);" id="callCountLabel">0件</span>
        </div>
        <div class="card-body">
          <div id="callHistory">
            <div class="empty-state"><div class="empty-icon">📭</div><p>架電履歴はありません</p></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 顧客編集モーダル -->
<div class="modal-backdrop" id="editModal">
  <div class="modal">
    <div class="modal-header"><h2>顧客情報の編集</h2><button class="modal-close" onclick="closeEditModal()">&times;</button></div>
    <div class="modal-body">
      <form id="editForm" onsubmit="return handleEdit(event)">
        <div class="form-group"><label>会社名<span class="required">*</span></label><input type="text" name="companyName" required></div>
        <div class="form-row">
          <div class="form-group"><label>担当者名</label><input type="text" name="contactName"></div>
          <div class="form-group"><label>部署・役職</label><input type="text" name="department"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>電話番号<span class="required">*</span></label><input type="tel" name="phone" required></div>
          <div class="form-group"><label>メールアドレス</label><input type="email" name="email"></div>
        </div>
        <div class="form-group"><label>住所</label><input type="text" name="address"></div>
        <div class="form-group">
          <label>業種</label>
          <select name="industry" id="editIndustrySelect"><option value="">-- 選択してください --</option></select>
        </div>
        <div class="form-group">
          <label>ステータスタグ</label>
          <div class="tag-buttons" id="editTagButtons"></div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeEditModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="document.getElementById('editForm').requestSubmit()">保存する</button>
    </div>
  </div>
</div>

<!-- 通話記録編集モーダル -->
<div class="modal-backdrop" id="editCallModal">
  <div class="modal">
    <div class="modal-header"><h2>通話記録の編集</h2><button class="modal-close" onclick="closeEditCallModal()">&times;</button></div>
    <div class="modal-body">
      <div class="form-group">
        <label>架電日時</label>
        <input type="datetime-local" id="editCallDate">
      </div>
      <div class="form-group">
        <label>電話ステータス</label>
        <div class="tag-buttons" id="editCallStatusButtons"></div>
      </div>
      <div class="form-group">
        <label>通話時間</label>
        <input type="text" id="editCallDuration" placeholder="例: 03:45">
      </div>
      <div class="form-group">
        <label>メモ</label>
        <textarea id="editCallMemo"></textarea>
      </div>
      <div class="form-group">
        <label>❓ お客様からの質問</label>
        <textarea id="editCallQuestion"></textarea>
      </div>
      <input type="hidden" id="editingCallId">
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeEditCallModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="handleEditCall()">保存する</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-api.js"></script>
<script>
  // ── embed モード（iframe内表示）──
  const isEmbed = new URLSearchParams(location.search).has('embed');
  if (isEmbed) {
    document.body.classList.add('embedded');
    const nav = document.querySelector('.navbar');
    if (nav) nav.style.display = 'none';
    const bc = document.querySelector('.breadcrumb');
    if (bc) bc.style.display = 'none';
    const backBtn = document.getElementById('backBtn');
    if (backBtn) backBtn.style.display = 'none';
  }

  // ── 認証チェック ──
  (function() {
    const a = JSON.parse(localStorage.getItem('authSession') || 'null');
    if (!a || Date.now() > a.expiry) { localStorage.removeItem('authSession'); location.replace('login.html'); }
  })();

  function logout() {
    if (confirm('ログアウトしますか？')) { localStorage.removeItem('authSession'); location.href = 'login.html'; }
  }

  const CALL_STATUSES = ['不在', '即切り', '対応あり', '担当者対応', '折り返し待ち'];

  let customer = null;
  let callRecords = [];
  let businessId = '';
  let selectedTags = new Set();
  let editTags = new Set();
  let timerInterval = null;
  let timerSeconds = 0;
  let timerRunning = false;
  let selectedCallStatus = '';
  let editingCallStatus = '';

  function getParams() {
    const p = new URLSearchParams(window.location.search);
    return { id: p.get('id'), businessId: p.get('businessId') || '' };
  }

  function getBusinessTags() {
    const tagsByBiz = JSON.parse(localStorage.getItem('customerTagsByBusiness') || '{}');
    const raw = tagsByBiz[businessId];
    if (!raw) return normalizeTagDefs(['見込み高', '見込み低', 'アポ済み', '断り', '要フォロー']);
    return normalizeTagDefs(raw);
  }

  function getTagNames() {
    return getBusinessTags().map(t => t.name);
  }

  function getIndustryList() {
    return JSON.parse(localStorage.getItem('industryList') || '[]');
  }

  document.addEventListener('DOMContentLoaded', async () => {
    const auth = JSON.parse(localStorage.getItem('authSession') || 'null');
    if (auth) {
      const el = document.getElementById('navUserInfo');
      if (el) el.textContent = `👤 ${auth.name}`;
      if (auth.role !== 'admin') { const li = document.getElementById('navSettingsLi'); if (li) li.style.display = 'none'; }
    }
    const params = getParams();
    businessId = params.businessId;
    if (!params.id) { window.location.href = 'index.html'; return; }

    updateNavLinks();
    setOperatorDisplay();
    initCallDate();
    renderCallStatusButtons();

    showLoading(true);
    try {
      const [, customerData] = await Promise.all([
        syncSettingsFromSupabase(),
        apiGetCustomer(params.id)
      ]);
      updateNavLinks();
      setOperatorDisplay();
      customer = customerData.customer;
      callRecords = customerData.callHistory || [];
      renderDetail();
      renderTagButtons();
      loadCrossBusinessDuplicates();
    } catch(e) { showToast('読み込みに失敗しました: ' + e.message, 'error'); }
    finally { showLoading(false); }

    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('navMenu').classList.toggle('open');
    });
  });

  function updateNavLinks() {
    const biz = encodeURIComponent(businessId);
    document.getElementById('navCustomers').href = `customers.html?businessId=${biz}`;
    document.getElementById('bcBiz').href = `customers.html?businessId=${biz}`;
    const businesses = JSON.parse(localStorage.getItem('businesses') || '[]');
    const b = businesses.find(x => x.id === businessId);
    if (b) document.getElementById('bcBiz').textContent = b.name;
  }

  function initCallDate() {
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    document.getElementById('callDate').value = now.toISOString().slice(0, 16);
  }

  async function loadCustomerDetail(id) {
    showLoading(true);
    try {
      const data = await apiGetCustomer(id);
      customer = data.customer;
      callRecords = data.callHistory || [];
      renderDetail();
      renderTagButtons();
    } catch(e) { showToast('読み込みに失敗しました: ' + e.message, 'error'); }
    finally { showLoading(false); }
  }

  function renderDetail() {
    if (!customer) return;
    document.title = `${customer.companyName} - テレアポ顧客管理`;
    document.getElementById('bcName').textContent = customer.companyName;
    document.getElementById('pageTitle').textContent = customer.companyName;

    const phone = String(customer.phone || '');
    const phoneClean = phone.replace(/[-\s()]/g, '');

    const tags = (customer.tags || '').split(',').filter(Boolean);
    const tagDefs = getBusinessTags();
    document.getElementById('customerTagsDisplay').innerHTML = tags.length > 0
      ? tags.map(t => {
          const rank = getTagRank(t.trim(), tagDefs);
          const rc = getRankClass(rank);
          return `<span class="badge badge-tag ${rc}">${esc(t.trim())}</span>`;
        }).join(' ')
      : '<span style="font-size:13px;color:var(--text-muted);">タグなし</span>';

    document.getElementById('customerInfo').innerHTML = `
      <div class="info-item"><span class="info-label">会社名</span><span class="info-value">${esc(customer.companyName)}</span></div>
      <div class="info-item"><span class="info-label">担当者</span><span class="info-value">${esc(customer.contactName || '-')}</span></div>
      <div class="info-item"><span class="info-label">部署・役職</span><span class="info-value">${esc(customer.department || '-')}</span></div>
      <div class="info-item"><span class="info-label">電話番号</span><span class="info-value"><a href="tel:${esc(phone)}">${esc(phone || '-')}</a></span></div>
      <div class="info-item"><span class="info-label">メールアドレス</span><span class="info-value">${customer.email ? `<a href="mailto:${esc(customer.email)}">${esc(customer.email)}</a>` : '-'}</span></div>
      <div class="info-item"><span class="info-label">住所</span><span class="info-value">${esc(customer.address || '-')}</span></div>
      <div class="info-item"><span class="info-label">業種</span><span class="info-value">${esc(customer.industry || '-')}</span></div>
      <div class="info-item"><span class="info-label">架電回数</span><span class="info-value">${customer.callCount || 0}回</span></div>
      <div class="info-item"><span class="info-label">最終架電日</span><span class="info-value">${customer.lastCallDate ? formatDate(customer.lastCallDate) : '-'}</span></div>
      <div class="info-item"><span class="info-label">登録日</span><span class="info-value">${formatDate(customer.createdAt)}</span></div>
      <div class="info-item"><span class="info-label">更新日</span><span class="info-value">${formatDate(customer.updatedAt)}</span></div>`;

    if (phoneClean) {
      document.getElementById('telBtn').href = `tel:${phoneClean}`;
      document.getElementById('zoomBtn').href = `zoomphonecall://${phoneClean}`;
      document.getElementById('callActions').style.display = '';
    }

    renderNotes();
    renderCallHistory();
  }

  // ════════════════════════════
  // 備考管理
  // ════════════════════════════
  function parseNotes() {
    if (!customer || !customer.notes) return [];
    try {
      const parsed = JSON.parse(customer.notes);
      if (Array.isArray(parsed)) return parsed;
    } catch(e) {}
    // 旧形式（プレーンテキスト）を単一エントリに変換
    return [{ id: 'legacy', date: customer.createdAt || new Date().toISOString(), author: '登録時', content: customer.notes }];
  }

  function renderNotes() {
    const notes = parseNotes();
    const container = document.getElementById('notesContainer');
    if (notes.length === 0) {
      container.innerHTML = '<p style="color:var(--text-muted);font-size:14px;padding:4px 0;">備考はありません</p>';
      return;
    }
    const sorted = [...notes].sort((a, b) => new Date(b.date) - new Date(a.date));
    container.innerHTML = sorted.map(n => `
      <div class="note-entry">
        <div class="note-meta">
          <span class="note-date">${formatDateTime(n.date)}</span>
          <span class="note-author">${esc(n.author || '-')}</span>
          ${n.id !== 'legacy' ? `<button class="note-delete-btn" onclick="deleteNote('${n.id}')" title="この備考を削除">×</button>` : ''}
        </div>
        <div class="note-content">${esc(n.content)}</div>
      </div>`).join('');
  }

  function openAddNoteForm() {
    document.getElementById('addNoteForm').style.display = '';
    document.getElementById('noteInput').focus();
  }

  function closeAddNoteForm() {
    document.getElementById('addNoteForm').style.display = 'none';
    document.getElementById('noteInput').value = '';
  }

  async function doAddNote() {
    const content = document.getElementById('noteInput').value.trim();
    if (!content) { showToast('内容を入力してください', 'error'); return; }
    const auth = getCurrentUser();
    const notes = parseNotes();
    notes.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      date: new Date().toISOString(),
      author: auth?.name || '不明',
      content
    });
    showLoading(true);
    try {
      await apiUpdateCustomer({ id: customer.id, notes: JSON.stringify(notes) });
      customer.notes = JSON.stringify(notes);
      renderNotes();
      closeAddNoteForm();
      showToast('備考を追加しました', 'success');
    } catch(e) { showToast('失敗: ' + e.message, 'error'); }
    finally { showLoading(false); }
  }

  async function deleteNote(noteId) {
    if (!confirm('この備考を削除しますか？')) return;
    const notes = parseNotes().filter(n => n.id !== noteId);
    showLoading(true);
    try {
      await apiUpdateCustomer({ id: customer.id, notes: JSON.stringify(notes) });
      customer.notes = JSON.stringify(notes);
      renderNotes();
      showToast('備考を削除しました', 'success');
    } catch(e) { showToast('失敗: ' + e.message, 'error'); }
    finally { showLoading(false); }
  }

  // ════════════════════════════
  // 電話ステータス
  // ════════════════════════════
  function renderCallStatusButtons() {
    document.getElementById('callStatusButtons').innerHTML = CALL_STATUSES.map(s => {
      const sel = selectedCallStatus === s ? ' selected' : '';
      return `<button type="button" class="call-status-btn${sel}" data-status="${esc(s)}" onclick="selectCallStatus(this)">${esc(s)}</button>`;
    }).join('');
  }

  function selectCallStatus(btn) {
    selectedCallStatus = selectedCallStatus === btn.dataset.status ? '' : btn.dataset.status;
    renderCallStatusButtons();
  }

  // ════════════════════════════
  // 顧客タグ操作
  // ════════════════════════════
  function renderTagButtons() {
    const availableTags = getBusinessTags();
    const currentTags = customer ? (customer.tags || '').split(',').filter(Boolean).map(t => t.trim()) : [];
    selectedTags = new Set(currentTags);

    document.getElementById('tagButtons').innerHTML = availableTags.map(tagDef => {
      const sel = selectedTags.has(tagDef.name) ? ' selected' : '';
      const rc = getRankClass(tagDef.rank);
      const rankLabel = tagDef.rank ? `[${tagDef.rank}] ` : '';
      return `<button type="button" class="tag-btn ${rc}${sel}" data-tag="${esc(tagDef.name)}" onclick="toggleTag(this, 'selectedTags')">${rankLabel}${esc(tagDef.name)}</button>`;
    }).join('');
  }

  function toggleTag(btn, setName) {
    const tagSet = setName === 'editTags' ? editTags : selectedTags;
    const tag = btn.dataset.tag;
    if (tagSet.has(tag)) { tagSet.delete(tag); btn.classList.remove('selected'); }
    else { tagSet.add(tag); btn.classList.add('selected'); }
  }

  // ════════════════════════════
  // 架電履歴
  // ════════════════════════════
  function renderCallHistory() {
    const container = document.getElementById('callHistory');
    document.getElementById('callCountLabel').textContent = `${callRecords.length}件`;
    if (callRecords.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>架電履歴はありません</p></div>`;
      return;
    }
    const sorted = [...callRecords].sort((a, b) => new Date(b.callDate) - new Date(a.callDate));
    container.innerHTML = `<div class="timeline">${sorted.map(r => {
      const resultBadge = r.result ? `<span class="badge badge-call-status">${esc(r.result)}</span>` : '';
      return `<div class="timeline-item">
        <div class="timeline-dot"></div>
        <div class="timeline-header">
          <span class="timeline-date">${formatDateTime(r.callDate)}</span>
          ${resultBadge}
          <div class="timeline-actions">
            <button class="btn btn-sm btn-outline" style="padding:3px 8px;" onclick="openEditCallModal('${r.id}')" title="編集">✏️</button>
            <button class="btn btn-sm btn-outline" style="padding:3px 8px;color:var(--danger);" onclick="handleDeleteCall('${r.id}')" title="削除">🗑️</button>
          </div>
        </div>
        <div class="timeline-body">${esc(r.memo || 'メモなし')}</div>
        ${r.question ? `<div class="timeline-question"><span class="timeline-question-label">❓ お客様からの質問:</span> ${esc(r.question)}</div>` : ''}
        <div class="timeline-meta">対応者: ${esc(r.operator || '-')} ／ 通話時間: ${r.duration || '-'}</div>
      </div>`;
    }).join('')}</div>`;
  }

  // ════════════════════════════
  // 通話記録 編集・削除
  // ════════════════════════════
  function openEditCallModal(callId) {
    const call = callRecords.find(r => r.id === callId);
    if (!call) return;
    document.getElementById('editingCallId').value = callId;
    const dt = new Date(call.callDate);
    dt.setMinutes(dt.getMinutes() - dt.getTimezoneOffset());
    document.getElementById('editCallDate').value = dt.toISOString().slice(0, 16);
    document.getElementById('editCallDuration').value = call.duration || '';
    document.getElementById('editCallMemo').value = call.memo || '';
    document.getElementById('editCallQuestion').value = call.question || '';
    editingCallStatus = call.result || '';
    renderEditCallStatusButtons();
    document.getElementById('editCallModal').classList.add('show');
  }

  function closeEditCallModal() { document.getElementById('editCallModal').classList.remove('show'); }

  function renderEditCallStatusButtons() {
    document.getElementById('editCallStatusButtons').innerHTML = CALL_STATUSES.map(s => {
      const sel = editingCallStatus === s ? ' selected' : '';
      return `<button type="button" class="call-status-btn${sel}" data-status="${esc(s)}" onclick="selectEditCallStatus(this)">${esc(s)}</button>`;
    }).join('');
  }

  function selectEditCallStatus(btn) {
    editingCallStatus = editingCallStatus === btn.dataset.status ? '' : btn.dataset.status;
    renderEditCallStatusButtons();
  }

  async function handleEditCall() {
    const callId = document.getElementById('editingCallId').value;
    showLoading(true);
    try {
      await apiUpdateCallRecord(callId, {
        callDate: document.getElementById('editCallDate').value,
        result:   editingCallStatus,
        duration: document.getElementById('editCallDuration').value.trim(),
        memo:     document.getElementById('editCallMemo').value.trim(),
        question: document.getElementById('editCallQuestion').value.trim(),
      });
      showToast('通話記録を更新しました', 'success');
      closeEditCallModal();
      await loadCustomerDetail(customer.id);
    } catch(e) { showToast('更新に失敗しました: ' + e.message, 'error'); }
    finally { showLoading(false); }
  }

  async function handleDeleteCall(callId) {
    if (!confirm('この通話記録を削除しますか？\n架電回数も1件減ります。')) return;
    showLoading(true);
    try {
      await apiDeleteCallRecord(callId, customer.id);
      showToast('通話記録を削除しました', 'success');
      await loadCustomerDetail(customer.id);
    } catch(e) { showToast('削除に失敗しました: ' + e.message, 'error'); }
    finally { showLoading(false); }
  }

  // ════════════════════════════
  // 架電登録パネル
  // ════════════════════════════
  function toggleCallPanel() {
    const toggle = document.getElementById('callPanelToggle');
    const body = document.getElementById('callPanelBody');
    toggle.classList.toggle('open');
    body.classList.toggle('open');
  }

  function setOperatorDisplay() {
    const auth = getCurrentUser();
    const el = document.getElementById('operatorDisplay');
    if (el) el.textContent = auth?.name || '—';
  }

  // ── タイマー ──
  function startTimer() {
    if (timerRunning) return;
    timerRunning = true;
    document.getElementById('timerDisplay').classList.add('active');
    document.getElementById('timerStart').style.display = 'none';
    document.getElementById('timerStop').style.display = '';
    timerInterval = setInterval(() => { timerSeconds++; updateTimerDisplay(); }, 1000);
  }
  function stopTimer() {
    timerRunning = false; clearInterval(timerInterval);
    document.getElementById('timerDisplay').classList.remove('active');
    document.getElementById('timerStart').style.display = '';
    document.getElementById('timerStop').style.display = 'none';
    document.getElementById('callDuration').value = fmtTimer(timerSeconds);
  }
  function resetTimer() { stopTimer(); timerSeconds = 0; updateTimerDisplay(); document.getElementById('callDuration').value = ''; }
  function updateTimerDisplay() { document.getElementById('timerDisplay').textContent = fmtTimer(timerSeconds); }
  function fmtTimer(s) { return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }

  // ── 架電結果送信 ──
  async function handleCallSubmit(event) {
    event.preventDefault();
    const auth = getCurrentUser();
    if (!auth?.name) { showToast('ログイン情報の取得に失敗しました', 'error'); return false; }
    if (timerRunning) stopTimer();

    showLoading(true);
    try {
      await apiAddCallRecord({
        customerId: customer.id,
        callDate:   document.getElementById('callDate').value,
        result:     selectedCallStatus,
        duration:   document.getElementById('callDuration').value || fmtTimer(timerSeconds),
        operator:   auth.name,
        memo:       document.getElementById('callMemo').value.trim(),
        question:   document.getElementById('callQuestion').value.trim(),
        tags:       [...selectedTags].join(','),
      });
      showToast('架電結果を登録しました', 'success');
      document.getElementById('callMemo').value = '';
      document.getElementById('callQuestion').value = '';
      selectedCallStatus = '';
      renderCallStatusButtons();
      resetTimer();
      initCallDate();
      await loadCustomerDetail(customer.id);
    } catch(e) { showToast('登録に失敗しました: ' + e.message, 'error'); }
    finally { showLoading(false); }
    return false;
  }

  // ════════════════════════════
  // 顧客編集
  // ════════════════════════════
  function openEditModal() {
    if (!customer) return;
    const f = document.getElementById('editForm');
    f.companyName.value = customer.companyName || '';
    f.contactName.value = customer.contactName || '';
    f.department.value = customer.department || '';
    f.phone.value = customer.phone || '';
    f.email.value = customer.email || '';
    f.address.value = customer.address || '';

    // 業種セレクト初期化
    const indList = getIndustryList();
    const indSel = document.getElementById('editIndustrySelect');
    indSel.innerHTML = '<option value="">-- 選択してください --</option>' +
      indList.map(ind => `<option value="${esc(ind)}"${customer.industry === ind ? ' selected' : ''}>${esc(ind)}</option>`).join('');
    if (customer.industry && !indList.includes(customer.industry)) {
      indSel.innerHTML += `<option value="${esc(customer.industry)}" selected>${esc(customer.industry)}</option>`;
    }

    editTags = new Set((customer.tags || '').split(',').filter(Boolean).map(t => t.trim()));
    const availableTags = getBusinessTags();
    document.getElementById('editTagButtons').innerHTML = availableTags.map(tagDef => {
      const sel = editTags.has(tagDef.name) ? ' selected' : '';
      const rc = getRankClass(tagDef.rank);
      const rankLabel = tagDef.rank ? `[${tagDef.rank}] ` : '';
      return `<button type="button" class="tag-btn ${rc}${sel}" data-tag="${esc(tagDef.name)}" onclick="toggleTag(this, 'editTags')">${rankLabel}${esc(tagDef.name)}</button>`;
    }).join('');

    document.getElementById('editModal').classList.add('show');
  }
  function closeEditModal() { document.getElementById('editModal').classList.remove('show'); }

  async function handleEdit(event) {
    event.preventDefault();
    const f = event.target;
    showLoading(true);
    try {
      await apiUpdateCustomer({
        id:          customer.id,
        companyName: f.companyName.value.trim(),
        contactName: f.contactName.value.trim(),
        department:  f.department.value.trim(),
        phone:       f.phone.value.trim(),
        email:       f.email.value.trim(),
        address:     f.address.value.trim(),
        industry:    f.industry.value,
        tags:        [...editTags].join(','),
      });
      showToast('顧客情報を更新しました', 'success');
      closeEditModal();
      await loadCustomerDetail(customer.id);
    } catch(e) { showToast('更新に失敗しました: ' + e.message, 'error'); }
    finally { showLoading(false); }
    return false;
  }

  async function handleDelete() {
    if (!confirm(`「${customer.companyName}」を削除しますか？\nこの操作は取り消せません。`)) return;
    showLoading(true);
    try {
      await apiDeleteCustomer(customer.id);
      showToast('顧客を削除しました', 'success');
      setTimeout(() => { window.location.href = `customers.html?businessId=${encodeURIComponent(businessId)}`; }, 1000);
    } catch(e) { showToast('削除に失敗しました: ' + e.message, 'error'); }
    finally { showLoading(false); }
  }

  // ════════════════════════════
  // 戻る・アーカイブ・他業務重複
  // ════════════════════════════
  function goBackToList() {
    window.location.href = `customers.html?businessId=${encodeURIComponent(businessId)}`;
  }

  async function handleArchive() {
    if (!customer) return;
    if (!confirm(`「${customer.companyName}」をアーカイブしますか？\nアーカイブ一覧から復元できます。`)) return;
    showLoading(true);
    try {
      await apiArchiveCustomer(customer.id);
      showToast('アーカイブしました', 'success');
      setTimeout(() => goBackToList(), 1000);
    } catch(e) { showToast('失敗: ' + e.message, 'error'); }
    finally { showLoading(false); }
  }

  async function loadCrossBusinessDuplicates() {
    if (!customer) return;
    try {
      const dups = await apiGetCrossBusinessDuplicates(customer.companyName, customer.phone, customer.id);
      if (dups.length === 0) return;
      const businesses = JSON.parse(localStorage.getItem('businesses') || '[]');
      const el = document.getElementById('crossBizDups');
      el.style.display = '';
      el.innerHTML = `<strong>⚠️ 他業務にも存在:</strong><br>` +
        dups.map(d => {
          const biz = businesses.find(b => b.id === d.businessId);
          return `・${biz ? biz.name : d.businessId} / ${esc(d.companyName)} / 架電${d.callCount}回 ${d.lastCallDate ? '/ 最終 ' + formatDate(d.lastCallDate) : ''}`;
        }).join('<br>');
    } catch(e) {}
  }

  // ════════════════════════════
  // ユーティリティ
  // ════════════════════════════
  function formatDate(d) { if (!d) return '-'; const dt = new Date(d); if (isNaN(dt)) return d; return `${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')}`; }
  function formatDateTime(d) { if (!d) return '-'; const dt = new Date(d); if (isNaN(dt)) return d; return `${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`; }
  function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function showLoading(v) { document.getElementById('loading').classList.toggle('show', v); }
  function showToast(msg, type = 'success') {
    const c = document.getElementById('toastContainer'); const t = document.createElement('div'); t.className = `toast ${type}`;
    t.innerHTML = `<span>${type==='success'?'✅':'❌'}</span> ${esc(msg)}`;
    c.appendChild(t); setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 4000);
  }
  document.getElementById('editModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeEditModal(); });
  document.getElementById('editCallModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeEditCallModal(); });
</script>

</body>
