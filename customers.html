<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📞</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>顧客一覧 - テレアポ顧客管理</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-brand"><span class="icon">📞</span>テレアポ顧客管理</a>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    <ul class="navbar-nav" id="navMenu">
      <li><a href="index.html">🏠 ホーム</a></li>
      <li><a href="#" class="active" id="navCustomers">📋 顧客一覧</a></li>
      <li><a href="dashboard.html">📊 ダッシュボード</a></li>
      <li><a href="questions.html">❓ 質問・回答</a></li>
      <li><a href="import.html">📥 インポート</a></li>
      <li id="navSettingsLi"><a href="settings.html">⚙️ 設定</a></li>
      <li class="nav-user" id="navUserInfo"></li>
      <li><button class="btn-logout" onclick="logout()">ログアウト</button></li>
    </ul>
  </div>
</nav>

<div class="loading-overlay" id="loading"><div class="spinner"></div></div>
<div class="toast-container" id="toastContainer"></div>

<div class="split-view" id="splitView">
  <div class="split-list">
    <div class="breadcrumb">
      <a href="index.html">ホーム</a><span>›</span><span id="breadcrumbBiz">顧客一覧</span>
    </div>

    <div class="biz-banner" id="bizBanner">
      <div class="biz-banner-icon" id="bizIcon">📦</div>
      <div class="biz-banner-info">
        <h1 id="bizName">業務名</h1>
        <p id="bizDesc">業務の説明</p>
      </div>
    </div>

    <div class="page-header">
      <div></div>
      <button class="btn btn-primary" onclick="openAddModal()">＋ 新規顧客登録</button>
    </div>

    <div class="stats-row">
      <div class="stat-card total"><div class="stat-value" id="statTotal">-</div><div class="stat-label">総顧客数</div></div>
      <div class="stat-card called"><div class="stat-value" id="statCalled">-</div><div class="stat-label">架電済み</div></div>
      <div class="stat-card not-called"><div class="stat-value" id="statNotCalled">-</div><div class="stat-label">未架電</div></div>
    </div>

    <div class="toolbar">
      <div class="toolbar-row">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="会社名・担当者名・電話番号で検索..." oninput="saveFilterState();applyFilters()">
        </div>
        <select class="filter-select" id="callCountFilter" onchange="saveFilterState();applyFilters()">
          <option value="">すべての架電状態</option>
          <option value="0">未架電</option>
          <option value="1-3">1〜3回</option>
          <option value="4+">4回以上</option>
        </select>
        <select class="filter-select" id="sortSelect" onchange="saveFilterState();applyFilters()">
          <option value="updated_desc">更新日（新しい順）</option>
          <option value="updated_asc">更新日（古い順）</option>
          <option value="company_asc">会社名（昇順）</option>
          <option value="company_desc">会社名（降順）</option>
          <option value="calls_desc">架電回数（多い順）</option>
          <option value="created_desc">登録日（新しい順）</option>
        </select>
      </div>
      <div class="toolbar-row">
        <div class="filter-tags" id="filterTags">
          <span class="filter-tags-label">🏷️ タグ絞り込み:</span>
        </div>
        <button class="btn btn-sm btn-outline" id="tagModeBtn" onclick="toggleTagMode()" style="white-space:nowrap;margin-left:auto;">OR</button>
        <button class="btn btn-sm btn-outline" id="archiveToggle" onclick="toggleArchiveView()" style="white-space:nowrap;">📦 アーカイブ</button>
      </div>
    </div>

    <!-- PC テーブル -->
    <div class="table-wrapper">
      <div class="table-scroll">
        <table>
          <thead><tr><th>会社名</th><th>電話番号</th><th>タグ</th><th>架電回数</th><th>最終架電日</th><th>操作</th></tr></thead>
          <tbody id="customerTableBody"></tbody>
        </table>
      </div>
      <div class="pagination" id="pagination">
        <span id="paginationInfo"></span>
        <div class="pagination-buttons" id="paginationButtons"></div>
      </div>
    </div>

    <!-- モバイルカード -->
    <div class="mobile-cards" id="mobileCards"></div>
  </div>

  <!-- リサイズハンドル -->
  <div class="split-resizer" id="splitResizer" style="display:none;"></div>

  <!-- 詳細パネル -->
  <div class="split-detail" id="splitDetail" style="display:none;">
    <div class="split-detail-header">
      <button class="btn-close-detail" onclick="closeDetail()">✕ 閉じる</button>
    </div>
    <iframe id="detailFrame" src="about:blank"></iframe>
  </div>
</div>

<!-- 新規顧客登録モーダル -->
<div class="modal-backdrop" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <h2>新規顧客登録</h2>
      <button class="modal-close" onclick="closeAddModal()">&times;</button>
    </div>
    <div class="modal-body">
      <form id="addCustomerForm" onsubmit="return false">
        <div class="form-group"><label>会社名<span class="required">*</span></label><input type="text" name="companyName" required placeholder="例：株式会社サンプル"></div>
        <div class="form-row">
          <div class="form-group"><label>担当者名</label><input type="text" name="contactName" placeholder="例：山田太郎"></div>
          <div class="form-group"><label>部署・役職</label><input type="text" name="department" placeholder="例：営業部 部長"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>電話番号<span class="required">*</span></label><input type="tel" name="phone" required placeholder="例：03-1234-5678"></div>
          <div class="form-group"><label>メールアドレス</label><input type="email" name="email" placeholder="例：yamada@example.com"></div>
        </div>
        <div class="form-group"><label>住所</label><input type="text" name="address" placeholder="例：東京都渋谷区..."></div>
        <div class="form-group"><label>備考</label><textarea name="notes" placeholder="メモを入力..."></textarea></div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeAddModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="doAddCustomer()">登録する</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-api.js"></script>
<script>
  // ── 認証チェック ──
  (function() {
    const a = JSON.parse(localStorage.getItem('authSession') || 'null');
    if (!a || Date.now() > a.expiry) { localStorage.removeItem('authSession'); location.replace('login.html'); }
  })();

  function logout() {
    if (confirm('ログアウトしますか？')) { localStorage.removeItem('authSession'); location.href = 'login.html'; }
  }

  const ROWS_PER_PAGE = 20;
  const CACHE_KEY_CUSTOMERS = () => `customers_${currentBusinessId}`;
  let allCustomers = [];
  let filteredCustomers = [];
  let currentPage = 1;
  let currentBusinessId = '';
  let currentBusiness = null;
  let activeTagFilters = new Set();
  let tagFilterMode = 'OR';
  let showingArchived = false;

  function getBusinessId() { return new URLSearchParams(window.location.search).get('businessId') || ''; }

  function getBusinessTags() {
    const tagsByBiz = JSON.parse(localStorage.getItem('customerTagsByBusiness') || '{}');
    return tagsByBiz[currentBusinessId] || ['見込み高', '見込み低', 'アポ済み', '断り', '要フォロー'];
  }

  document.addEventListener('DOMContentLoaded', async () => {
    const auth = getCurrentUser();
    if (auth) {
      const el = document.getElementById('navUserInfo');
      if (el) el.textContent = `👤 ${auth.name}`;
      if (auth.role !== 'admin') { const li = document.getElementById('navSettingsLi'); if (li) li.style.display = 'none'; }
    }
    currentBusinessId = getBusinessId();
    if (!currentBusinessId) { window.location.href = 'index.html'; return; }
    if (!canAccessBusiness(currentBusinessId)) { alert('この業務へのアクセス権限がありません'); window.location.href = 'index.html'; return; }
    restoreFilterState();

    // キャッシュから即座に表示
    const cached = localStorage.getItem(CACHE_KEY_CUSTOMERS());
    if (cached) {
      try {
        allCustomers = JSON.parse(cached);
        const businesses = JSON.parse(localStorage.getItem('businesses') || '[]');
        currentBusiness = businesses.find(b => b.id === currentBusinessId);
        if (currentBusiness) { renderBanner(); updateNavLinks(); renderFilterTags(); applyFilters(); updateStats(allCustomers); }
      } catch(e) {}
    }

    // 設定と顧客データを同時取得（Supabase）
    showLoading(true);
    try {
      const [, customersData] = await Promise.all([
        syncSettingsFromSupabase(),
        apiGetCustomers(currentBusinessId)
      ]);

      allCustomers = customersData.customers || [];
      localStorage.setItem(CACHE_KEY_CUSTOMERS(), JSON.stringify(allCustomers));

      const businesses = JSON.parse(localStorage.getItem('businesses') || '[]');
      currentBusiness = businesses.find(b => b.id === currentBusinessId);
      if (!currentBusiness) { window.location.href = 'index.html'; return; }

      renderBanner(); updateNavLinks(); renderFilterTags(); applyFilters(); updateStats(allCustomers);
    } catch(e) {
      if (!cached) {
        showToast('データの読み込みに失敗しました: ' + e.message, 'error');
        renderEmpty('データの読み込みに失敗しました。');
        updateStats([]);
      }
    } finally { showLoading(false); }

    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('navMenu').classList.toggle('open');
    });
  });

  function renderBanner() {
    document.title = `${currentBusiness.name} - テレアポ顧客管理`;
    document.getElementById('bizIcon').textContent = currentBusiness.icon;
    document.getElementById('bizIcon').style.background = `${currentBusiness.color}15`;
    document.getElementById('bizName').textContent = currentBusiness.name;
    document.getElementById('bizDesc').textContent = currentBusiness.description || '';
    document.getElementById('breadcrumbBiz').textContent = currentBusiness.name;
    document.querySelector('.stat-card.total').style.borderTopColor = currentBusiness.color;
  }

  function updateNavLinks() {
    const biz = encodeURIComponent(currentBusinessId);
    document.getElementById('navCustomers').href = `customers.html?businessId=${biz}`;
  }

  function renderFilterTags() {
    const tags = getBusinessTags();
    const container = document.getElementById('filterTags');
    const activeCount = activeTagFilters.size;
    container.innerHTML = '<span class="filter-tags-label">🏷️ タグ絞り込み:</span>' +
      (activeCount > 0 ? `<button class="btn btn-sm btn-outline" style="font-size:11px;padding:3px 8px;" onclick="clearTagFilters()">✕ フィルタ解除</button>` : '') +
      `<button class="filter-tag-btn no-tag${activeTagFilters.has('__none__') ? ' active' : ''}" data-tag="__none__" onclick="toggleFilterTag(this)">タグなし</button>` +
      tags.map(t => `<button class="filter-tag-btn${activeTagFilters.has(t) ? ' active' : ''}" data-tag="${esc(t)}" onclick="toggleFilterTag(this)">${esc(t)}</button>`).join('');
  }

  function clearTagFilters() {
    activeTagFilters.clear();
    saveFilterState();
    renderFilterTags();
    applyFilters();
  }

  function toggleFilterTag(btn) {
    const tag = btn.dataset.tag;
    if (activeTagFilters.has(tag)) { activeTagFilters.delete(tag); btn.classList.remove('active'); }
    else { activeTagFilters.add(tag); btn.classList.add('active'); }
    saveFilterState();
    applyFilters();
  }

  function toggleTagMode() {
    tagFilterMode = tagFilterMode === 'OR' ? 'AND' : 'OR';
    document.getElementById('tagModeBtn').textContent = tagFilterMode;
    saveFilterState();
    applyFilters();
  }

  async function toggleArchiveView() {
    showingArchived = !showingArchived;
    const btn = document.getElementById('archiveToggle');
    btn.textContent = showingArchived ? '📋 通常一覧' : '📦 アーカイブ';
    btn.style.background = showingArchived ? '#fef3c7' : '';
    showLoading(true);
    try {
      const data = showingArchived
        ? await apiGetArchivedCustomers(currentBusinessId)
        : await apiGetCustomers(currentBusinessId);
      allCustomers = data.customers || [];
      applyFilters();
      updateStats(allCustomers);
    } catch(e) { showToast('読み込み失敗: ' + e.message, 'error'); }
    finally { showLoading(false); }
  }

  async function archiveCustomer(id, name) {
    if (!confirm(`「${name}」をアーカイブしますか？\n後でアーカイブ一覧から復元できます。`)) return;
    showLoading(true);
    try {
      await apiArchiveCustomer(id);
      showToast('アーカイブしました', 'success');
      await loadCustomers();
    } catch(e) { showToast('失敗: ' + e.message, 'error'); }
    finally { showLoading(false); }
  }

  async function restoreCustomer(id, name) {
    if (!confirm(`「${name}」を復元しますか？`)) return;
    showLoading(true);
    try {
      await apiRestoreCustomer(id);
      showToast('復元しました', 'success');
      await toggleArchiveView();
    } catch(e) { showToast('失敗: ' + e.message, 'error'); }
    finally { showLoading(false); }
  }

  function saveFilterState() {
    const state = {
      search: document.getElementById('searchInput').value,
      callFilter: document.getElementById('callCountFilter').value,
      sort: document.getElementById('sortSelect').value,
      tags: [...activeTagFilters],
      tagMode: tagFilterMode,
      scrollY: window.scrollY,
      page: currentPage,
    };
    sessionStorage.setItem(`filterState_${currentBusinessId}`, JSON.stringify(state));
  }

  function restoreFilterState() {
    const raw = sessionStorage.getItem(`filterState_${currentBusinessId}`);
    if (!raw) return;
    try {
      const s = JSON.parse(raw);
      if (s.search) document.getElementById('searchInput').value = s.search;
      if (s.callFilter) document.getElementById('callCountFilter').value = s.callFilter;
      if (s.sort) document.getElementById('sortSelect').value = s.sort;
      if (s.tags) { activeTagFilters = new Set(s.tags); }
      if (s.tagMode) { tagFilterMode = s.tagMode; document.getElementById('tagModeBtn').textContent = tagFilterMode; }
      if (s.page) currentPage = s.page;
      if (s.scrollY) setTimeout(() => window.scrollTo(0, s.scrollY), 100);
    } catch(e) {}
  }

  async function loadCustomers() {
    showLoading(true);
    try {
      const data = await apiGetCustomers(currentBusinessId);
      allCustomers = data.customers || [];
      localStorage.setItem(CACHE_KEY_CUSTOMERS(), JSON.stringify(allCustomers));
      applyFilters();
      updateStats(allCustomers);
    } catch(e) {
      showToast('データの読み込みに失敗しました: ' + e.message, 'error');
    } finally { showLoading(false); }
  }

  function updateStats(customers) {
    document.getElementById('statTotal').textContent = customers.length;
    document.getElementById('statCalled').textContent = customers.filter(c => (c.callCount || 0) > 0).length;
    document.getElementById('statNotCalled').textContent = customers.filter(c => (c.callCount || 0) === 0).length;
  }

  function applyFilters() {
    const query = document.getElementById('searchInput').value.toLowerCase().trim();
    const callFilter = document.getElementById('callCountFilter').value;
    const sortVal = document.getElementById('sortSelect').value;

    filteredCustomers = allCustomers.filter(c => {
      const matchSearch = !query ||
        (c.companyName || '').toLowerCase().includes(query) ||
        (c.contactName || '').toLowerCase().includes(query) ||
        (c.phone || '').includes(query);

      let matchCallCount = true;
      const cc = c.callCount || 0;
      if (callFilter === '0') matchCallCount = cc === 0;
      else if (callFilter === '1-3') matchCallCount = cc >= 1 && cc <= 3;
      else if (callFilter === '4+') matchCallCount = cc >= 4;

      let matchTags = true;
      if (activeTagFilters.size > 0) {
        const cTags = (c.tags || '').split(',').filter(Boolean).map(t => t.trim());
        const realTags = new Set(activeTagFilters);
        realTags.delete('__none__');
        const wantNoTag = activeTagFilters.has('__none__');
        const isNoTag = cTags.length === 0;

        if (realTags.size === 0 && wantNoTag) {
          matchTags = isNoTag;
        } else if (wantNoTag && realTags.size > 0) {
          matchTags = isNoTag || (tagFilterMode === 'AND'
            ? [...realTags].every(ft => cTags.includes(ft))
            : [...realTags].some(ft => cTags.includes(ft)));
        } else {
          matchTags = tagFilterMode === 'AND'
            ? [...realTags].every(ft => cTags.includes(ft))
            : [...realTags].some(ft => cTags.includes(ft));
        }
      }

      return matchSearch && matchCallCount && matchTags;
    });

    filteredCustomers.sort((a, b) => {
      switch (sortVal) {
        case 'updated_desc': return new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0);
        case 'updated_asc':  return new Date(a.updatedAt || 0) - new Date(b.updatedAt || 0);
        case 'company_asc':  return (a.companyName || '').localeCompare(b.companyName || '', 'ja');
        case 'company_desc': return (b.companyName || '').localeCompare(a.companyName || '', 'ja');
        case 'calls_desc':   return (b.callCount || 0) - (a.callCount || 0);
        case 'created_desc': return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
        default: return 0;
      }
    });
    currentPage = 1;
    renderTable();
    renderMobileCards();
  }

  function renderTable() {
    const tbody = document.getElementById('customerTableBody');
    const start = (currentPage - 1) * ROWS_PER_PAGE;
    const end = start + ROWS_PER_PAGE;
    const pageData = filteredCustomers.slice(start, end);
    const biz = encodeURIComponent(currentBusinessId);

    if (filteredCustomers.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">📭</div><p>該当する顧客が見つかりません</p></div></td></tr>`;
      document.getElementById('paginationInfo').textContent = '';
      document.getElementById('paginationButtons').innerHTML = '';
      return;
    }

    tbody.innerHTML = pageData.map(c => {
      const tags = (c.tags || '').split(',').filter(Boolean);
      const tagsHtml = tags.length > 0
        ? `<div class="tag-badges">${tags.map(t => `<span class="tag-badge">${esc(t.trim())}</span>`).join('')}</div>`
        : '<span style="color:var(--gray-400);font-size:12px;">-</span>';
      const rowClass = c.id === activeDetailId ? ' class="active-row"' : '';
      return `<tr${rowClass} data-id="${c.id}" onclick="return openDetail(event,'${c.id}')" style="cursor:pointer">
        <td><a class="customer-name" href="detail.html?id=${encodeURIComponent(c.id)}&businessId=${biz}" onclick="return openDetail(event,'${c.id}')">${esc(c.companyName)}</a></td>
        <td>${esc(c.phone || '-')}</td>
        <td>${tagsHtml}</td>
        <td>${c.callCount || 0}回</td>
        <td>${c.lastCallDate ? formatDate(c.lastCallDate) : '-'}</td>
        <td style="white-space:nowrap">
          ${showingArchived
            ? `<button class="btn btn-sm btn-outline" onclick="event.stopPropagation();restoreCustomer('${c.id}','${esc(c.companyName)}')">♻️ 復元</button>`
            : `<a class="btn btn-sm btn-outline" href="detail.html?id=${encodeURIComponent(c.id)}&businessId=${biz}" onclick="return openDetail(event,'${c.id}')">📋 詳細</a>
               <button class="btn btn-sm btn-outline" onclick="event.stopPropagation();archiveCustomer('${c.id}','${esc(c.companyName)}')" title="アーカイブ" style="padding:5px 8px;color:var(--gray-400);">📦</button>`}
        </td>
      </tr>`;
    }).join('');
    renderPagination();
  }

  function renderMobileCards() {
    const biz = encodeURIComponent(currentBusinessId);
    const container = document.getElementById('mobileCards');
    if (filteredCustomers.length === 0) {
      container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>該当する顧客が見つかりません</p></div>';
      return;
    }
    container.innerHTML = filteredCustomers.map(c => {
      const tags = (c.tags || '').split(',').filter(Boolean);
      const tagsHtml = tags.length > 0
        ? `<div class="mobile-card-tags">${tags.map(t => `<span class="tag-badge">${esc(t.trim())}</span>`).join('')}</div>`
        : '';
      const activeClass = c.id === activeDetailId ? ' active-card' : '';
      return `<a class="mobile-card${activeClass}" data-id="${c.id}" href="detail.html?id=${encodeURIComponent(c.id)}&businessId=${biz}">
        <div class="mobile-card-info">
          <div class="mobile-card-name">${esc(c.companyName)}</div>
          <div class="mobile-card-phone">${esc(c.phone || '-')}</div>
          ${tagsHtml}
          <div class="mobile-card-meta">${c.callCount || 0}回架電 ${c.lastCallDate ? '・最終 ' + formatDate(c.lastCallDate) : ''}</div>
        </div>
        <span class="mobile-card-arrow">›</span>
      </a>`;
    }).join('');
  }

  function renderPagination() {
    const total = filteredCustomers.length;
    const totalPages = Math.ceil(total / ROWS_PER_PAGE);
    const start = (currentPage - 1) * ROWS_PER_PAGE + 1;
    const end = Math.min(currentPage * ROWS_PER_PAGE, total);
    document.getElementById('paginationInfo').textContent = `${total}件中 ${start}〜${end}件を表示`;
    const btns = document.getElementById('paginationButtons');
    if (totalPages <= 1) { btns.innerHTML = ''; return; }
    let html = `<button ${currentPage === 1 ? 'disabled' : ''} onclick="goToPage(${currentPage - 1})">‹ 前</button>`;
    const range = getPageRange(currentPage, totalPages);
    for (const p of range) {
      if (p === '...') html += `<button disabled>…</button>`;
      else html += `<button class="${p === currentPage ? 'active' : ''}" onclick="goToPage(${p})">${p}</button>`;
    }
    html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="goToPage(${currentPage + 1})">次 ›</button>`;
    btns.innerHTML = html;
  }

  function getPageRange(current, total) {
    if (total <= 7) return Array.from({length: total}, (_, i) => i + 1);
    if (current <= 3) return [1, 2, 3, 4, '...', total];
    if (current >= total - 2) return [1, '...', total - 3, total - 2, total - 1, total];
    return [1, '...', current - 1, current, current + 1, '...', total];
  }

  function goToPage(page) { currentPage = page; renderTable(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

  function openAddModal() { document.getElementById('addCustomerForm').reset(); document.getElementById('addModal').classList.add('show'); }
  function closeAddModal() { document.getElementById('addModal').classList.remove('show'); }

  async function doAddCustomer() {
    const form = document.getElementById('addCustomerForm');
    const companyName = (form.companyName.value || '').trim();
    const phone       = (form.phone.value || '').trim();

    if (!companyName) { showToast('会社名を入力してください', 'error'); return; }
    if (!phone)       { showToast('電話番号を入力してください', 'error'); return; }
    if (!currentBusinessId) { showToast('業務IDが取得できません', 'error'); return; }

    showLoading(true);
    try {
      const dups = await apiCheckDuplicates(companyName, phone, currentBusinessId);
      if (dups.sameBusinessDups.length > 0) {
        const dupNames = dups.sameBusinessDups.map(d => `・${d.companyName}（${d.phone}）[${d.matchType}]`).join('\n');
        if (!confirm(`⚠️ 同一業務内に重複候補があります:\n${dupNames}\n\nそれでも登録しますか？`)) {
          showLoading(false); return;
        }
      }
      const auth = getCurrentUser();
      const notesText = (form.notes.value || '').trim();
      const notesJson = notesText ? JSON.stringify([{
        id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
        date: new Date().toISOString(),
        author: auth?.name || '登録者',
        content: notesText
      }]) : '';
      await apiAddCustomer({
        businessId:  currentBusinessId,
        companyName,
        contactName: (form.contactName.value || '').trim(),
        department:  (form.department.value  || '').trim(),
        phone,
        email:       (form.email.value   || '').trim(),
        address:     (form.address.value || '').trim(),
        notes:       notesJson,
      });
      showToast('顧客を登録しました ✅', 'success');
      closeAddModal();
      form.reset();
      await loadCustomers();
    } catch(e) {
      showToast('登録に失敗しました: ' + (e.message || String(e)), 'error');
    } finally { showLoading(false); }
  }

  // ── スプリットビュー ──
  let activeDetailId = '';

  function openDetail(event, id) {
    // モバイルでは通常遷移
    if (window.innerWidth <= 768) return true;
    event.preventDefault();
    activeDetailId = id;
    const biz = encodeURIComponent(currentBusinessId);
    const frame = document.getElementById('detailFrame');
    frame.src = `detail.html?id=${encodeURIComponent(id)}&businessId=${biz}&embed=1`;
    document.getElementById('splitDetail').style.display = '';
    document.getElementById('splitResizer').style.display = '';
    document.getElementById('splitView').classList.add('open');
    // ハイライト更新
    document.querySelectorAll('tr.active-row').forEach(r => r.classList.remove('active-row'));
    const row = document.querySelector(`tr[data-id="${id}"]`);
    if (row) row.classList.add('active-row');
    document.querySelectorAll('.mobile-card.active-card').forEach(c => c.classList.remove('active-card'));
    const card = document.querySelector(`.mobile-card[data-id="${id}"]`);
    if (card) card.classList.add('active-card');
    return false;
  }

  function closeDetail() {
    activeDetailId = '';
    document.getElementById('splitDetail').style.display = 'none';
    document.getElementById('splitResizer').style.display = 'none';
    document.getElementById('splitView').classList.remove('open');
    document.getElementById('splitView').style.gridTemplateColumns = '';
    document.getElementById('detailFrame').src = 'about:blank';
    document.querySelectorAll('tr.active-row').forEach(r => r.classList.remove('active-row'));
    document.querySelectorAll('.mobile-card.active-card').forEach(c => c.classList.remove('active-card'));
  }

  // ── リサイザードラッグ ──
  (function() {
    const resizer = document.getElementById('splitResizer');
    const splitView = document.getElementById('splitView');
    let isDragging = false;

    resizer.addEventListener('mousedown', function(e) {
      e.preventDefault();
      isDragging = true;
      resizer.classList.add('dragging');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      // iframe のポインタイベントを無効にする（ドラッグ中）
      const frame = document.getElementById('detailFrame');
      if (frame) frame.style.pointerEvents = 'none';
    });

    document.addEventListener('mousemove', function(e) {
      if (!isDragging) return;
      const rect = splitView.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const totalWidth = rect.width;
      const leftWidth = Math.max(300, Math.min(x, totalWidth - 300));
      const rightWidth = totalWidth - leftWidth - 6;
      splitView.style.gridTemplateColumns = `${leftWidth}px 6px ${rightWidth}px`;
    });

    document.addEventListener('mouseup', function() {
      if (!isDragging) return;
      isDragging = false;
      resizer.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      const frame = document.getElementById('detailFrame');
      if (frame) frame.style.pointerEvents = '';
    });
  })();

  function renderEmpty(message) {
    document.getElementById('customerTableBody').innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">📋</div><p>${message}</p></div></td></tr>`;
    document.getElementById('paginationInfo').textContent = '';
    document.getElementById('paginationButtons').innerHTML = '';
    document.getElementById('mobileCards').innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p>${message}</p></div>`;
  }

  function formatDate(d) { if (!d) return '-'; const dt = new Date(d); if (isNaN(dt)) return d; return `${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')}`; }
  function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function showLoading(v) { document.getElementById('loading').classList.toggle('show', v); }
  function showToast(msg, type = 'success') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div'); t.className = `toast ${type}`;
    t.innerHTML = `<span>${type==='success'?'✅':'❌'}</span> ${esc(msg)}`;
    c.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 4000);
  }
  document.getElementById('addModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeAddModal(); });
</script>
