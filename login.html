<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📞</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - テレアポ顧客管理</title>
  <link rel="stylesheet" href="css/style.css">
  <script>
    // 開発用：自動ログイン（外部スクリプトより先に実行）
    localStorage.setItem('authSession', JSON.stringify({
      userId: 'admin',
      name: '管理者',
      role: 'admin',
      expiry: Date.now() + 30 * 24 * 60 * 60 * 1000
    }));
    location.replace('index.html');
  </script>
</head>
<body class="login-page">

<div class="login-card">
  <div class="login-logo">📞</div>
  <div class="login-title">テレアポ顧客管理</div>
  <div class="login-subtitle">ログインしてください</div>

  <div class="default-hint" id="defaultHint" style="display:none;">
    <strong>🔑 初期設定アカウント（初回のみ）</strong><br>
    ID：<code>admin</code>　パスワード：<code>admin123</code><br>
    ログイン後、設定画面でパスワードと追加アカウントを設定してください
  </div>

  <form id="loginForm" onsubmit="doLogin(); return false" autocomplete="on">
    <div class="form-group">
      <label for="loginId">ID</label>
      <input type="text" id="loginId" name="username"
             autocomplete="username" placeholder="IDを入力" required>
    </div>
    <div class="form-group">
      <label for="loginPassword">パスワード</label>
      <input type="password" id="loginPassword" name="password"
             autocomplete="current-password" placeholder="パスワードを入力" required>
    </div>
    <button type="button" class="btn-login" id="loginBtn" onclick="doLogin()">ログイン</button>
    <div class="error-msg" id="loginError"></div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-api.js"></script>
<script>
  // 開発用：自動ログイン
  (function() {
    localStorage.setItem('authSession', JSON.stringify({
      userId: 'admin',
      name: '管理者',
      role: 'admin',
      expiry: Date.now() + 30 * 24 * 60 * 60 * 1000
    }));
    location.replace('index.html');
  })();

  // パスワードハッシュ（SHA-256）
  async function hashPassword(password) {
    const encoder = new TextEncoder();
    const data = encoder.encode(password + '_teleapo_v1');
    const hash = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(hash))
      .map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function refreshHint() {
    // ヒントは常に非表示（セキュリティのため）
  }

  async function doLogin() {
    const id       = (document.getElementById('loginId').value || '').trim();
    const password = document.getElementById('loginPassword').value || '';
    const errorEl  = document.getElementById('loginError');
    const btn      = document.getElementById('loginBtn');

    if (!id) { errorEl.textContent = 'IDを入力してください'; errorEl.style.display = ''; return; }
    if (!password) { errorEl.textContent = 'パスワードを入力してください'; errorEl.style.display = ''; return; }

    btn.textContent = '確認中...';
    btn.disabled = true;
    errorEl.style.display = 'none';

    try {
      const users  = JSON.parse(localStorage.getItem('users') || '[]');
      const hashed = await hashPassword(password);
      let user     = users.find(u => u.loginId === id && u.password === hashed);

      // ユーザー未登録の場合はデフォルト管理者でログイン可
      if (!user && users.length === 0 && id === 'admin') {
        const defaultHash = await hashPassword('admin123');
        if (hashed === defaultHash) {
          user = { loginId: 'admin', name: '管理者', role: 'admin' };
        }
      }

      if (!user) {
        errorEl.textContent = 'IDまたはパスワードが違います';
        errorEl.style.display = '';
        return;
      }

      localStorage.setItem('authSession', JSON.stringify({
        userId : user.loginId,
        name   : user.name,
        role   : user.role,
        expiry : Date.now() + 30 * 24 * 60 * 60 * 1000
      }));

      location.href = 'index.html';
    } catch(e) {
      errorEl.textContent = 'エラー: ' + (e.message || 'ログインに失敗しました');
      errorEl.style.display = '';
    } finally {
      btn.textContent = 'ログイン';
      btn.disabled = false;
    }
  }

  // Supabaseからユーザー情報を取得（ログインに必須ではない）
  (async function init() {
    try {
      if (typeof syncSettingsFromSupabase === 'function') {
        await syncSettingsFromSupabase();
      }
      refreshHint();
    } catch(e) {}
  })();
</script>

</body>
</html>
